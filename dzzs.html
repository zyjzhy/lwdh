            document.body.classList.remove('modal-open');
            if (modalResolve) {
                modalResolve(result);
                modalResolve = null;
            }
        }

        function initModal() {
            const overlay = document.getElementById('appModalOverlay');
            document.getElementById('appModalConfirm').addEventListener('click', () => closeModal(true));
            document.getElementById('appModalCancel').addEventListener('click', () => closeModal(false));
            overlay.addEventListener('click', e => {
                if (e.target === overlay) closeModal(false);
            });
            document.addEventListener('keydown', e => {
                if (e.key === 'Escape' && !overlay.hidden) closeModal(false);
            });
        }

        async function exitToMain() {
            if (currentExam && !(await confirmLeaveExam())) return;
            stopExamTimer();
            clearExamFooterState();
            setExamMode(false);
            currentExam = null;
            setActiveNav('all');
            animateContentArea();
            document.getElementById('content-area').innerHTML = generateAllQuestionsHTML();
            scrollToTop();
        }

        async function confirmLeaveExam() {
            if (!currentExam) return true;
            const msg = currentExam.submitted
                ? '确定要退出考试吗？'
                : '确定要退出考试吗？当前作答进度将不会保存。';
            return showConfirmModal('退出考试', msg, { warn: true, confirmText: '退出', cancelText: '继续作答' });
        }

        async function showSection(section) {
            if (section !== 'exam' && currentExam) {
                if (!(await confirmLeaveExam())) return;
            }
            if (section !== 'exam') {
                stopExamTimer();
                clearExamFooterState();
                setExamMode(false);
            }
            setActiveNav(section);
            animateContentArea();
            currentExam = null;
            const contentArea = document.getElementById('content-area');
            if (section === 'exam') {
                showExamEntry(false);
                return;
            }
            if (section === 'all') {
                contentArea.innerHTML = generateAllQuestionsHTML();
            } else if (section === 'defense') {
                contentArea.innerHTML = generateQuestionTypeHTML('defense', defenseSection.name, questionsData.defense);
            } else {
                const s = sections.find(x => x.id === section);
                if (s) contentArea.innerHTML = generateQuestionTypeHTML(section, s.name, questionsData[section]);
            }
            scrollToTop();
        }

        async function showExamEntry(updateNav) {
            if (updateNav !== false && currentExam) {
                if (!(await confirmLeaveExam())) return;
            }
            stopExamTimer();
            setActiveNav('exam');
            animateContentArea();
            currentExam = null;
            clearExamFooterState();
            setExamMode(true);
            renderExamEntry();
        }

        function renderExamEntry() {
            const total = EXAM_COUNTS.single + EXAM_COUNTS.multiple + EXAM_COUNTS.judge + EXAM_COUNTS.short;
            const gradable = EXAM_COUNTS.single + EXAM_COUNTS.multiple + EXAM_COUNTS.judge;
            document.getElementById('content-area').innerHTML =
                `<div class="exam-page-body exam-page-body--entry">
                <div class="exam-entry">
                    <div class="exam-entry-icon">考</div>
                    <h2>欢迎参加党课模拟考试</h2>
                    <p class="exam-entry-desc">系统将从党课题库中随机抽取试题，客观题自动判分，简答题提交后显示参考答案。</p>
                    <div class="exam-entry-chips">
                        <span class="exam-chip total">共 ${total} 题</span>
                        <span class="exam-chip objective">客观题 ${gradable} 道</span>
                        <span class="exam-chip subjective">简答题 ${EXAM_COUNTS.short} 道</span>
                    </div>
                    <div class="exam-entry-rules">
                        <h3>考试说明</h3>
                        <ul>
                            <li>单选题 ${EXAM_COUNTS.single} 道、多选题 ${EXAM_COUNTS.multiple} 道、判断题 ${EXAM_COUNTS.judge} 道，提交后自动比对正确答案</li>
                            <li>简答题 ${EXAM_COUNTS.short} 道，可自由作答，提交后显示参考答案，不计入自动得分</li>
                            <li>作答完毕请点击「提交答卷」查看成绩与解析</li>
                            <li>考试时长 60 分钟，到时系统将自动提交答卷</li>
                            <li>考试过程中请勿刷新页面，退出将不保存作答进度</li>
                        </ul>
                    </div>
                    <div class="exam-entry-actions">
                        <button type="button" class="btn-exam-start" onclick="beginExam()">▶ 开始考试</button>
                        <button type="button" class="btn-exam-entry-exit" onclick="exitToMain()">✕ 退出</button>
                    </div>
                </div>
                </div>`;
            scrollToTop();
        }

        function beginExam() {
            setActiveNav('exam');
            setExamMode(true);
            animateContentArea();
            currentExam = createExamSession();
            renderExamPage();
        }

        async function exitExam() {
            if (!(await confirmLeaveExam())) return;
            stopExamTimer();
            clearExamFooterState();
            showExamEntry(false);
        }

        async function regenerateExam() {
            if (currentExam && !currentExam.submitted) {
                const ok = await showConfirmModal(
                    '重新抽题',
                    '重新抽题将清空当前作答并重置倒计时，确定继续吗？',
                    { warn: true, confirmText: '重新抽题', cancelText: '取消' }
                );
                if (!ok) return;
            }
            currentExam = createExamSession();
            renderExamPage();
        }

        function renderExamPage() {
            const submitted = currentExam.submitted;
            clearExamFooterState();
            document.body.classList.add('exam-has-footer');

            let html = renderExamPageHeader({
                showStats: true,
                showTimer: !submitted,
                hideActions: true
            });
            html += `<div class="exam-page-body">`;
            html += `<div class="exam-score-panel" id="examScorePanel"></div>`;

            let sectionType = null;
            let sectionNum = 0;
            currentExam.questions.forEach((item, idx) => {
                if (item.type !== sectionType) {
                    sectionType = item.type;
                    sectionNum++;
                    const prefix = ['一', '二', '三', '四'][sectionNum - 1] || '';
                    const count = currentExam.questions.filter(q => q.type === item.type).length;
                    html += `<h3 class="content-subheading">${prefix}、${typeLabels[item.type]} <span style="font-weight:500;color:#9ca3af;font-size:0.9em;">(${count} 题)</span></h3>`;
                }
                html += renderExamQuestionCard(item, idx);
            });
            html += `</div>`;

            if (!submitted) {
                html += `<div class="exam-page-footer" id="examFooter">
                    <div class="exam-footer-sheet">
                        <button type="button" class="exam-footer-toggle" onclick="toggleExamFooter()" aria-expanded="false" aria-label="展开操作栏">
                            <span class="exam-footer-handle"></span>
                            <span class="exam-footer-toggle-arrow"></span>
                        </button>
                        <div class="exam-footer-actions">
                            <button type="button" class="btn-exam-footer-regen" onclick="regenerateExam()">↻ 重新抽题</button>
                            <button type="button" class="btn-exam-submit-full" id="submitExamBtn" onclick="submitExam()">✓ 提交答卷</button>
                            <button type="button" class="btn-exam-footer-exit" onclick="exitExam()">✕ 退出</button>
                        </div>
                    </div>
                </div>`;
            } else {
                html += `<div class="exam-page-footer submitted">
                    <span class="exam-footer-hint"><strong>答卷已提交</strong> · 可继续查看解析</span>
                    <button type="button" class="btn-exam-footer-exit" onclick="exitExam()">✕ 退出</button>
                </div>`;
            }

            document.getElementById('content-area').innerHTML = html;
            if (!submitted) {
                syncExamFooterLayout();
                startExamTimer();
            }
            scrollToTop();
        }

        function syncExamFooterLayout() {
            const footer = document.getElementById('examFooter');
            if (!footer) return;
            const expanded = footer.classList.contains('expanded');
            document.body.classList.toggle('exam-footer-expanded', expanded);
            updateExamFooterToggleState(expanded);
        }

        let examFooterResizeTimer;
        window.addEventListener('resize', function() {
            clearTimeout(examFooterResizeTimer);
            examFooterResizeTimer = setTimeout(syncExamFooterLayout, 120);
        });

        function updateExamFooterToggleState(expanded) {
            const toggle = document.querySelector('.exam-footer-toggle');
            if (toggle) {
                toggle.setAttribute('aria-expanded', String(expanded));
                toggle.setAttribute('aria-label', expanded ? '收起操作栏' : '展开操作栏');
            }
        }

        function toggleExamFooter() {
            const footer = document.getElementById('examFooter');
            if (!footer) return;
            const expanded = footer.classList.toggle('expanded');
            document.body.classList.toggle('exam-footer-expanded', expanded);
            updateExamFooterToggleState(expanded);
        }

        function renderExamQuestionCard(item, idx) {
            const { type, question: q } = item;
            const disabled = currentExam.submitted ? 'disabled' : '';
            let body = `<div class="question-text">${q.text}</div>`;

            if (type === 'single' && q.options) {
                body += `<div class="options exam-options">`;
                q.options.forEach(opt => {
                    const letter = getOptionLetter(opt);
                    body += `<label class="option-selectable option-long" data-letter="${letter}">
                        <input type="radio" name="exam-${idx}" value="${letter}" ${disabled}>
                        <span>${opt}</span>
                    </label>`;
                });
                body += `</div>`;
            } else if (type === 'multiple' && q.options) {
                body += `<div class="options exam-options">`;
                q.options.forEach(opt => {
                    const letter = getOptionLetter(opt);
                    body += `<label class="option-selectable option-long" data-letter="${letter}">
                        <input type="checkbox" name="exam-${idx}" value="${letter}" ${disabled}>
                        <span>${opt}</span>
                    </label>`;
                });
                body += `<p class="short-hint">多选题可选择多个选项</p></div>`;
            } else if (type === 'judge') {
                body += `<div class="options exam-options judge-options">
                    <label class="option-selectable" data-letter="√">
                        <input type="radio" name="exam-${idx}" value="√" ${disabled}><span>正确 (√)</span>
                    </label>
                    <label class="option-selectable" data-letter="×">
                        <input type="radio" name="exam-${idx}" value="×" ${disabled}><span>错误 (×)</span>
                    </label>
                </div>`;
            } else if (type === 'short') {
                body += `<textarea class="short-textarea" name="exam-short-${idx}" placeholder="可在此作答（不作自动比对，提交后查看参考答案）" ${disabled}></textarea>
                <p class="short-hint">简答题不计入自动得分，提交后显示参考答案</p>`;
            }

            body += `<div class="exam-answer-reveal" id="exam-reveal-${idx}"></div>`;

            return `<div class="question-card exam-card" id="exam-card-${idx}" data-exam-idx="${idx}" data-type="${type}">
                <div class="q-card-head">
                    <div class="q-card-head-left">
                        <span class="q-num">第 ${idx + 1} 题</span>
                        <span class="q-type-tag ${type}">${typeLabels[type]}</span>
                    </div>
                </div>
                <div class="q-card-body">${body}</div>
            </div>`;
        }

        function getUserExamAnswer(idx, type) {
            if (type === 'multiple') {
                const checked = document.querySelectorAll(`input[name="exam-${idx}"]:checked`);
                return normalizeMultiAnswer(Array.from(checked).map(el => el.value).join(''));
            }
            if (type === 'short') return null;
            const sel = document.querySelector(`input[name="exam-${idx}"]:checked`);
            return sel ? sel.value : '';
        }

        function submitExam(isAutoSubmit) {
            if (!currentExam || currentExam.submitted) return;
            stopExamTimer();

            let correct = 0, wrong = 0, unanswered = 0;
            const breakdown = { single: { c: 0, t: 0 }, multiple: { c: 0, t: 0 }, judge: { c: 0, t: 0 } };

            currentExam.questions.forEach((item, idx) => {
                const { type, question: q } = item;
                const card = document.getElementById(`exam-card-${idx}`);
                const reveal = document.getElementById(`exam-reveal-${idx}`);
                card.classList.add('submitted');

                document.querySelectorAll(`#exam-card-${idx} input, #exam-card-${idx} textarea`).forEach(inp => { inp.disabled = true; });

                if (type === 'short') {
                    reveal.className = 'exam-answer-reveal visible reference';
                    reveal.innerHTML = `<span class="reveal-label">参考答案</span>${q.answer}`;
                    return;
                }

                breakdown[type].t++;
                const userAns = getUserExamAnswer(idx, type);
                const isCorrect = userAns && checkExamAnswer(type, userAns, q.answer);

                if (!userAns) {
                    unanswered++;
                    card.classList.add('result-wrong');
                    reveal.className = 'exam-answer-reveal visible wrong';
                    reveal.innerHTML = `<span class="reveal-label">未作答 · 正确答案：${formatCorrectAnswer(type, q.answer)}</span>`;
                    highlightExamOptions(idx, type, '', q.answer, false);
                } else if (isCorrect) {
                    correct++;
                    breakdown[type].c++;
                    card.classList.add('result-correct');
                    reveal.className = 'exam-answer-reveal visible correct';
                    reveal.innerHTML = `<span class="reveal-label">回答正确</span>你的答案：${formatCorrectAnswer(type, userAns)}`;
                } else {
                    wrong++;
                    card.classList.add('result-wrong');
                    reveal.className = 'exam-answer-reveal visible wrong';
                    reveal.innerHTML = `<span class="reveal-label">回答错误</span>你的答案：${formatCorrectAnswer(type, userAns) || '未选'}<br>正确答案：${formatCorrectAnswer(type, q.answer)}`;
                }

                highlightExamOptions(idx, type, userAns, q.answer, isCorrect);
            });

            currentExam.submitted = true;
            const gradable = correct + wrong + unanswered;
            const pct = gradable ? Math.round(correct / gradable * 100) : 0;
            const autoNote = isAutoSubmit ? '<div class="score-auto-note">考试时间已到，系统已自动提交答卷</div>' : '';
            const panel = document.getElementById('examScorePanel');
            panel.className = 'exam-score-panel visible';
            panel.innerHTML = `
                ${autoNote}
                <div class="score-big">${correct} / ${gradable}</div>
                <div class="score-detail">客观题正确率 ${pct}% · 答对 ${correct} 题 · 答错 ${wrong} 题 · 未答 ${unanswered} 题 · 简答题 ${EXAM_COUNTS.short} 道请对照参考答案</div>
                <div class="score-breakdown">
                    <span class="score-chip">单选 ${breakdown.single.c}/${breakdown.single.t}</span>
                    <span class="score-chip">多选 ${breakdown.multiple.c}/${breakdown.multiple.t}</span>
                    <span class="score-chip">判断 ${breakdown.judge.c}/${breakdown.judge.t}</span>
                </div>`;
            const submitBtn = document.getElementById('submitExamBtn');
            if (submitBtn) submitBtn.disabled = true;
            const footer = document.querySelector('.exam-page-footer');
            if (footer) {
                footer.className = 'exam-page-footer submitted';
                footer.innerHTML = `<span class="exam-footer-hint"><strong>答卷已提交</strong> · 可继续查看解析</span>
                    <button type="button" class="btn-exam-footer-exit" onclick="exitExam()">✕ 退出</button>`;
            }
            document.body.classList.remove('exam-footer-expanded');
            document.body.classList.add('exam-footer-submitted');
            const timerBox = document.getElementById('examTimerBox');
            if (timerBox) {
                timerBox.outerHTML = '<span class="exam-timer-done">已交卷</span>';
            }
            panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        function formatCorrectAnswer(type, ans) {
            if (type === 'multiple') return ans.split('').join('、');
            return ans;
        }

        function highlightExamOptions(idx, type, userAns, correctAns, isCorrect) {
            const card = document.getElementById(`exam-card-${idx}`);
            const labels = card.querySelectorAll('.option-selectable');
            const correctSet = new Set(type === 'multiple' ? correctAns.split('') : [correctAns]);
            const userSet = new Set(type === 'multiple' ? userAns.split('') : userAns ? [userAns] : []);

            labels.forEach(label => {
                const letter = label.getAttribute('data-letter');
                if (userSet.has(letter)) label.classList.add(isCorrect ? 'correct-pick' : 'wrong-pick');
                if (!isCorrect && correctSet.has(letter) && !userSet.has(letter)) label.classList.add('missed-answer');
            });
        }

        function toggleAnswer(el) {
            el.classList.toggle('expanded');
        }

        function renderQuestionCard(type, q, highlightTerm, displayNum) {
            const hl = t => highlightTerm ? highlightText(t, highlightTerm) : t;
            const num = displayNum !== undefined ? displayNum : q.id;
            const cardClass = type === 'defense' ? 'question-card defense-card' : 'question-card';
            let html = `<div class="${cardClass}">`;
            html += `<div class="q-card-head"><div class="q-card-head-left">
                <span class="q-num">第 ${num} 题</span>
                <span class="q-type-tag ${type}">${typeLabels[type] || type}</span>
            </div></div>`;
            html += `<div class="q-card-body"><div class="question-text">${hl(q.text)}</div>`;
            if (type !== 'judge' && type !== 'short' && type !== 'defense' && q.options) {
                html += '<div class="options">';
                q.options.forEach(o => { html += `<div class="option">${hl(o)}</div>`; });
                html += '</div>';
            }
            const isLongAnswer = type === 'short' || type === 'defense';
            const answerText = isLongAnswer ? q.answer : '正确答案: ' + q.answer;
            const shortClass = isLongAnswer ? ' short' : '';
            html += `<div class="answer${shortClass}" onclick="toggleAnswer(this)"><span class="a-text">${answerText}</span><span class="a-toggle">▶ 点击展开答案</span><span class="a-collapse">▲ 收起答案</span></div>`;
            html += `</div></div>`;
            return html;
        }

        function generateQuestionTypeHTML(type, title, questions) {
            let html = `<h2 class="content-heading">${title} <span style="font-size:0.75em;font-weight:500;color:#6b7280;">共 ${questions.length} 题</span></h2>`;
            questions.forEach(q => { html += renderQuestionCard(type, q); });
            return html;
        }

        function generateAllQuestionsHTML() {
            let html = `<h2 class="content-heading">党课全部题目</h2>`;
            let total = 0;
            const counts = {};
            sections.forEach(s => {
                const qs = questionsData[s.id];
                total += qs.length;
                counts[s.id] = qs.length;
                html += `<h3 class="content-subheading">${s.prefix}${s.name.replace('党课', '')} <span style="font-weight:500;color:#9ca3af;font-size:0.9em;">(${qs.length} 题)</span></h3>`;
                qs.forEach(q => { html += renderQuestionCard(s.id, q); });
            });
            html += `<div class="stats">`;
            html += `<div class="stat-item"><div class="stat-number">${total}</div><div class="stat-label">党课题总数</div></div>`;
            sections.forEach(s => {
                html += `<div class="stat-item"><div class="stat-number">${counts[s.id]}</div><div class="stat-label">${s.name.replace('党课', '')}</div></div>`;
            });
            html += `</div>`;
            return html;
        }

        async function searchQuestions() {
            const searchTerm = document.getElementById('searchInput').value.trim().toLowerCase();
            if (!searchTerm) { showSection('all'); return; }
            if (currentExam && !(await confirmLeaveExam())) return;
            stopExamTimer();
            clearExamFooterState();
            setExamMode(false);
            
            let results = [];
            const typesToSearch = ['single', 'multiple', 'judge', 'short', 'defense'];
            typesToSearch.forEach(typeId => {
                questionsData[typeId].forEach(question => {
                    if (fuzzyMatch(question.text.toLowerCase(), searchTerm)) {
                        results.push({ type: typeId, question: question });
                    }
                });
            });
            
            // 搜索时清除导航高亮
            currentExam = null;
            document.querySelectorAll('.type-nav-item').forEach(item => item.classList.remove('active'));
            
            function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
            const contentArea = document.getElementById('content-area');
            if (results.length === 0) {
                contentArea.innerHTML = `<div style="text-align: center; padding: 50px;"><h3 style="color:#8b0000;">搜索结果</h3><p>未找到包含「${esc(searchTerm)}」的题目</p><p style="color:#6b7280;">尝试使用更简单的关键词或检查拼写</p></div>`;
                scrollToTop();
                return;
            }
            
            let html = `<h2 class="content-heading">搜索结果 <span style="font-size:0.75em;font-weight:500;color:#6b7280;">共 ${results.length} 条</span></h2><p style="color:#6b7280;margin-bottom:8px;">关键词：<span class="highlight">${esc(searchTerm)}</span></p>`;
            const typeNames = { single: '党课单选题', multiple: '党课多选题', judge: '党课判断题', short: '党课简答题', defense: '党员转正答辩题' };
            const grouped = {};
            results.forEach(r => {
                (grouped[typeNames[r.type]] = grouped[typeNames[r.type]] || []).push(r);
            });
            Object.keys(grouped).forEach(tn => {
                html += `<h3 class="content-subheading">${tn}</h3>`;
                grouped[tn].forEach(r => { html += renderQuestionCard(r.type, r.question, searchTerm); });
            });
            contentArea.innerHTML = html;
            scrollToTop();
        }

        function fuzzyMatch(text, searchTerm) {
            if (!searchTerm) return true;
            const sc = Array.from(searchTerm), tc = Array.from(text);
            let si = 0;
            for (let i = 0; i < tc.length && si < sc.length; i++) {
                if (tc[i] === sc[si]) si++;
            }
            return si === sc.length;
        }

        function highlightText(text, term) {
            if (!term) return text;
            const tc = Array.from(text), sc = Array.from(term);
            const pos = [];
            let si = 0;
            for (let i = 0; i < tc.length && si < sc.length; i++) {
                if (tc[i] === sc[si]) { pos.push(i); si++; }
            }
            return tc.map((c, i) => pos.includes(i) ? `<span class="highlight">${c}</span>` : c).join('');
        }

        async function resetFilters() {
            document.getElementById('searchInput').value = '';
            if (currentExam && !(await confirmLeaveExam())) return;
            stopExamTimer();
            clearExamFooterState();
            setExamMode(false);
            currentExam = null;
            showSection('all');
        }

        function init() {
            if ('scrollRestoration' in history) {
                history.scrollRestoration = 'manual';
            }
            window.addEventListener('pageshow', scrollToTop);
            document.addEventListener('visibilitychange', function() {
                if (document.visibilityState === 'visible') scrollToTop();
            });
            initModal();
            document.getElementById('searchBtn').addEventListener('click', searchQuestions);
            document.getElementById('resetBtn').addEventListener('click', resetFilters);
            document.getElementById('searchInput').addEventListener('keydown', function(e) {
                if (e.key === 'Enter') searchQuestions();
            });
            document.getElementById('content-area').addEventListener('change', function(e) {
                if (e.target.matches('.exam-options input')) {
                    const label = e.target.closest('.option-selectable');
                    if (!label || currentExam?.submitted) return;
                    if (e.target.type === 'radio') {
                        label.closest('.exam-options').querySelectorAll('.option-selectable').forEach(l => l.classList.remove('selected'));
                    }
                    label.classList.toggle('selected', e.target.checked);
                }
            });
            showSection('all');
        }

        init();
    </script>
</body>
</html>
